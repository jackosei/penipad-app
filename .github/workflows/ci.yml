name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit and integration tests
        run: npm run test

      # Ink-latency benchmark gate (PRD principle 2). Wired in Step 2 when the
      # engine and bench/ink-latency.bench.ts exist; the script is a no-op until then.
      - name: Ink latency benchmark
        run: npm run bench

      - name: Build
        run: npm run build
